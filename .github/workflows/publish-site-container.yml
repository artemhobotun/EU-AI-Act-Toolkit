name: Publish site container

concurrency:
  group: publish-site-container-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - docker/Dockerfile
      - docs/**
      - VERSION
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Image name and VERSION tag
        id: meta
        run: |
          OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${OWNER_LC}/eu-ai-act-toolkit-site" >> "$GITHUB_OUTPUT"
          ver="$(tr -d '\r\n\t ' < VERSION | head -c 64)"
          echo "version=${ver}" >> "$GITHUB_OUTPUT"

      - name: Trivy Dockerfile scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: ./docker
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
