name: Publish site container

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - docs/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/artemhobotun/eu-ai-act-toolkit-site:latest
            ghcr.io/artemhobotun/eu-ai-act-toolkit-site:${{ github.sha }}
