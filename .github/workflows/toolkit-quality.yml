name: Toolkit quality checks

concurrency:
  group: toolkit-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  pull_request:
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'

permissions:
  contents: read

jobs:
  quality-checks:
    name: All Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck

      - name: Run ShellCheck (error severity)
        run: |
          shellcheck -S error -x .github/tools/scripts/check-toolkit-quality.sh
          shellcheck -S error .github/tools/scripts/check-common-links.sh .github/tools/scripts/build-starter-pack.sh

      - name: Run toolkit quality scripts
        run: ./.github/tools/scripts/check-toolkit-quality.sh

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: .github/tools/quiz-engine/package-lock.json

      - name: Validate Pages HTML
        run: npx --yes html-validate@10.15.0 --config .github/tools/dev/htmlvalidate.json "docs/*.html"

      - name: Install Node dependencies
        run: npm ci
        working-directory: .github/tools/quiz-engine

      - name: TypeScript Check
        run: npm run typecheck
        working-directory: .github/tools/quiz-engine

      - name: Run Quiz Engine Tests
        run: npm test
        working-directory: .github/tools/quiz-engine

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install Python requirements
        run: pip install -r .github/tools/tools/requirements-ci.txt

      - name: Validate Data Registries
        run: python3 .github/tools/tools/validate_data_registries.py

      - name: Validate Schema Samples
        run: python3 .github/tools/tools/validate_schema_samples.py
