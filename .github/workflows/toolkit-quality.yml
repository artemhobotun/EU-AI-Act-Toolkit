name: Toolkit quality checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run toolkit quality checks
        run: ./scripts/check-toolkit-quality.sh

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dev/typescript-toolchain/package-lock.json
      - run: npm ci
        working-directory: dev/typescript-toolchain
      - run: npm run typecheck
        working-directory: dev/typescript-toolchain
      - run: npm test
        working-directory: dev/typescript-toolchain

  data-registries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r tools/requirements-ci.txt
      - run: python3 tools/validate_data_registries.py
