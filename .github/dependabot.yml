# EU-AI-Act-Toolkit: dependency bumps are committed on main (no version-update PR branches).
# open-pull-requests-limit: 0 disables Dependabot version-update PRs for each ecosystem.
# Enable a non-zero limit again if you want grouped PRs back. Security alerts: repo Settings → Code security.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 0

  - package-ecosystem: npm
    directory: /.github/node-toolchain
    schedule:
      interval: monthly
    open-pull-requests-limit: 0

  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: monthly
    open-pull-requests-limit: 0
