version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /.github/node-toolchain
    schedule:
      interval: weekly
    groups:
      node-toolchain:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
    groups:
      docker:
        patterns:
          - "*"
